# Kubernetes Deployment for Facebook Clone Enterprise
apiVersion: v1
kind: Namespace
metadata:
  name: facebook-clone
---
# ConfigMap for app configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: facebook-clone
data:
  NODE_ENV: "production"
  REDIS_URL: "redis://redis-service:6379"
  KAFKA_BROKERS: "kafka-service:9092"
---
# Secret for sensitive data
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: facebook-clone
type: Opaque
stringData:
  DATABASE_URL: "<DATABASE_URL>"
  JWT_SECRET: "<JWT_SECRET>"
  REDIS_PASSWORD: "<REDIS_PASSWORD>"
---
# Auth Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: facebook-clone
spec:
  replicas: 3
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: facebook-clone/auth-service:latest
        ports:
        - containerPort: 4001
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 4001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 4001
          initialDelaySeconds: 5
          periodSeconds: 5
---
# Auth Service
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: facebook-clone
spec:
  selector:
    app: auth-service
  ports:
  - port: 4001
    targetPort: 4001
---
# User Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: facebook-clone
spec:
  replicas: 3
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: facebook-clone/user-service:latest
        ports:
        - containerPort: 4002
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secrets
---
# Post Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: post-service
  namespace: facebook-clone
spec:
  replicas: 5
  selector:
    matchLabels:
      app: post-service
  template:
    metadata:
      labels:
        app: post-service
    spec:
      containers:
      - name: post-service
        image: facebook-clone/post-service:latest
        ports:
        - containerPort: 4003
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secrets
---
# Chat Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-service
  namespace: facebook-clone
spec:
  replicas: 3
  selector:
    matchLabels:
      app: chat-service
  template:
    metadata:
      labels:
        app: chat-service
    spec:
      containers:
      - name: chat-service
        image: facebook-clone/chat-service:latest
        ports:
        - containerPort: 4004
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secrets
---
# Ingress for API Gateway
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-ingress
  namespace: facebook-clone
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - api.facebook-clone.com
    secretName: api-tls
  rules:
  - host: api.facebook-clone.com
    http:
      paths:
      - path: /auth
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 4001
      - path: /users
        pathType: Prefix
        backend:
          service:
            name: user-service
            port:
              number: 4002
      - path: /posts
        pathType: Prefix
        backend:
          service:
            name: post-service
            port:
              number: 4003
---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: post-service-hpa
  namespace: facebook-clone
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: post-service
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
