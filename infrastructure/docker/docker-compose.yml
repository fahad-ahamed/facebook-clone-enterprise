# =====================================================
# Docker Compose - Facebook Clone
# Development environment setup
# =====================================================

version: '3.8'

services:
  # =====================================================
  # Frontend Apps
  # =====================================================

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NEXT_PUBLIC_WS_URL=ws://localhost:4001
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    depends_on:
      - gateway
    networks:
      - frontend

  admin-dashboard:
    build:
      context: ./apps/admin-dashboard
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    volumes:
      - ./apps/admin-dashboard:/app
      - /app/node_modules
    depends_on:
      - gateway
    networks:
      - frontend

  # =====================================================
  # API Gateway
  # =====================================================

  gateway:
    build:
      context: ./gateway/rest
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=dev-jwt-secret
      - AUTH_SERVICE_URL=http://auth-service:4001
      - USER_SERVICE_URL=http://user-service:4002
      - POST_SERVICE_URL=http://post-service:4003
    depends_on:
      - redis
      - auth-service
    networks:
      - backend
      - frontend

  graphql-gateway:
    build:
      context: ./gateway/graphql
      dockerfile: Dockerfile
    ports:
      - "4002:4002"
    environment:
      - NODE_ENV=development
      - AUTH_SERVICE_URL=http://auth-service:4001/graphql
      - USER_SERVICE_URL=http://user-service:4002/graphql
      - POST_SERVICE_URL=http://post-service:4003/graphql
    networks:
      - backend

  # =====================================================
  # Microservices
  # =====================================================

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    ports:
      - "4010:4010"
    environment:
      - NODE_ENV=development
      - PORT=4010
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/facebook
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=dev-jwt-secret
    depends_on:
      - postgres
      - redis
    networks:
      - backend

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    ports:
      - "4011:4011"
    environment:
      - NODE_ENV=development
      - PORT=4011
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/facebook
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - backend

  post-service:
    build:
      context: ./services/post-service
      dockerfile: Dockerfile
    ports:
      - "4012:4012"
    environment:
      - NODE_ENV=development
      - PORT=4012
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/facebook
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - backend

  feed-service:
    build:
      context: ./services/feed-system
      dockerfile: Dockerfile
    ports:
      - "4013:4013"
    environment:
      - NODE_ENV=development
      - PORT=4013
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/facebook
      - REDIS_URL=redis://redis:6379
      - MONGODB_URL=mongodb://mongodb:27017/facebook
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - postgres
      - redis
      - mongodb
      - kafka
    networks:
      - backend

  chat-service:
    build:
      context: ./services/chat-system
      dockerfile: Dockerfile
    ports:
      - "4014:4014"
    environment:
      - NODE_ENV=development
      - PORT=4014
      - MONGODB_URL=mongodb://mongodb:27017/facebook
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - mongodb
      - redis
      - kafka
    networks:
      - backend

  notification-service:
    build:
      context: ./services/notification-system
      dockerfile: Dockerfile
    ports:
      - "4015:4015"
    environment:
      - NODE_ENV=development
      - PORT=4015
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/facebook
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - backend

  search-service:
    build:
      context: ./services/search-system
      dockerfile: Dockerfile
    ports:
      - "4016:4016"
    environment:
      - NODE_ENV=development
      - PORT=4016
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/facebook
    depends_on:
      - elasticsearch
      - postgres
    networks:
      - backend

  media-service:
    build:
      context: ./services/media-system
      dockerfile: Dockerfile
    ports:
      - "4017:4017"
    environment:
      - NODE_ENV=development
      - PORT=4017
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET_IMAGES=images
      - S3_BUCKET_VIDEOS=videos
      - REDIS_URL=redis://redis:6379
    depends_on:
      - minio
      - redis
    networks:
      - backend

  ads-service:
    build:
      context: ./services/ads-system
      dockerfile: Dockerfile
    ports:
      - "4018:4018"
    environment:
      - NODE_ENV=development
      - PORT=4018
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/facebook
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - backend

  # =====================================================
  # WebSocket Server
  # =====================================================

  websocket-server:
    build:
      context: ./realtime/websocket-cluster
      dockerfile: Dockerfile
    ports:
      - "4001:4001"
    environment:
      - NODE_ENV=development
      - PORT=4001
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=dev-jwt-secret
    depends_on:
      - redis
    networks:
      - backend
      - frontend

  # =====================================================
  # Databases
  # =====================================================

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=facebook
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - backend

  mongodb:
    image: mongo:6
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
    volumes:
      - mongodb_data:/data/db
      - ./database/nosql:/docker-entrypoint-initdb.d
    networks:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - backend

  elasticsearch:
    image: elasticsearch:8.9.0
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - backend

  # =====================================================
  # Message Queue
  # =====================================================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - backend

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    depends_on:
      - zookeeper
    networks:
      - backend

  # =====================================================
  # Object Storage (MinIO - S3 compatible)
  # =====================================================

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - backend

  # =====================================================
  # Monitoring & Observability
  # =====================================================

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
    networks:
      - monitoring

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"  # UI
      - "14268:14268"  # HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - monitoring

# =====================================================
# Networks
# =====================================================

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
  monitoring:
    driver: bridge

# =====================================================
# Volumes
# =====================================================

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  elasticsearch_data:
  kafka_data:
  minio_data:
  prometheus_data:
  grafana_data:
