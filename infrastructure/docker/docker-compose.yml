# Docker Compose for Facebook Clone Enterprise
version: '3.8'

services:
  # Frontend Apps
  web-app:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      - postgres
      - redis

  admin-dashboard:
    build:
      context: ./apps/admin-dashboard
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
    depends_on:
      - web-app

  # API Gateway
  api-gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SERVICES=auth-service,user-service,post-service
    depends_on:
      - auth-service
      - user-service
      - post-service

  # Microservices
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    ports:
      - "4001:4001"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - postgres
      - redis

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    ports:
      - "4002:4002"
    depends_on:
      - postgres
      - neo4j

  post-service:
    build:
      context: ./services/post-service
      dockerfile: Dockerfile
    ports:
      - "4003:4003"
    depends_on:
      - postgres
      - elasticsearch

  chat-service:
    build:
      context: ./services/chat-system/chat-service
      dockerfile: Dockerfile
    ports:
      - "4004:4004"
    depends_on:
      - mongodb
      - redis

  notification-service:
    build:
      context: ./services/notification-system/notification-service
      dockerfile: Dockerfile
    ports:
      - "4005:4005"
    depends_on:
      - postgres
      - redis

  search-service:
    build:
      context: ./services/search-system
      dockerfile: Dockerfile
    ports:
      - "4006:4006"
    depends_on:
      - elasticsearch

  feed-service:
    build:
      context: ./services/feed-system
      dockerfile: Dockerfile
    ports:
      - "4007:4007"
    depends_on:
      - postgres
      - redis
      - kafka

  # Databases
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: facebook
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data

  elasticsearch:
    image: elasticsearch:8.9.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Message Queue
  kafka:
    image: confluentinc/cp-kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
    depends_on:
      - zookeeper

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  # Observability
  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "14268:14268"

volumes:
  postgres_data:
  mongodb_data:
  neo4j_data:
  es_data:
  redis_data:
