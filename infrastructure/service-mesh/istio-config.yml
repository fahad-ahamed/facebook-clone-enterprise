# =====================================================
# Istio Service Mesh Configuration
# =====================================================

apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: facebook-clone-gateway
  namespace: facebook-clone
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      tls:
        httpsRedirect: true
      hosts:
        - "*.facebook-clone.com"
    - port:
        number: 443
        name: https
        protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: facebook-clone-tls
      hosts:
        - "*.facebook-clone.com"

---
# =====================================================
# Virtual Services
# =====================================================

apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: gateway-vs
  namespace: facebook-clone
spec:
  hosts:
    - "api.facebook-clone.com"
  gateways:
    - facebook-clone-gateway
  http:
    - match:
        - uri:
            prefix: "/api/v1/auth"
      route:
        - destination:
            host: auth-service
            port:
              number: 4010
      retries:
        attempts: 3
        perTryTimeout: 2s
    - match:
        - uri:
            prefix: "/api/v1/users"
      route:
        - destination:
            host: user-service
            port:
              number: 4011
    - match:
        - uri:
            prefix: "/api/v1/posts"
      route:
        - destination:
            host: post-service
            port:
              number: 4012
    - match:
        - uri:
            prefix: "/api/v1/feed"
      route:
        - destination:
            host: feed-service
            port:
              number: 4013
    - match:
        - uri:
            prefix: "/api/v1/chat"
      route:
        - destination:
            host: chat-service
            port:
              number: 4014
    - match:
        - uri:
            prefix: "/api/v1/notifications"
      route:
        - destination:
            host: notification-service
            port:
              number: 4015
    - match:
        - uri:
            prefix: "/api/v1/search"
      route:
        - destination:
            host: search-service
            port:
              number: 4016
    - match:
        - uri:
            prefix: "/api/v1/media"
      route:
        - destination:
            host: media-service
            port:
              number: 4017
    - match:
        - uri:
            prefix: "/api/v1/ads"
      route:
        - destination:
            host: ads-service
            port:
              number: 4018
    - route:
        - destination:
            host: gateway
            port:
              number: 4000

---
# =====================================================
# Destination Rules (Circuit Breakers & Load Balancing)
# =====================================================

apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: auth-service-dr
  namespace: facebook-clone
spec:
  host: auth-service
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        h2UpgradePolicy: UPGRADE
        http1MaxPendingRequests: 100
        http2MaxRequests: 1000
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  subsets:
    - name: v1
      labels:
        version: v1

---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: chat-service-dr
  namespace: facebook-clone
spec:
  host: chat-service
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 500
      http:
        http1MaxPendingRequests: 500
        http2MaxRequests: 2000
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 10s
      baseEjectionTime: 10s
      maxEjectionPercent: 30
  subsets:
    - name: v1
      labels:
        version: v1

---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: feed-service-dr
  namespace: facebook-clone
spec:
  host: feed-service
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 200
      http:
        http1MaxPendingRequests: 200
        http2MaxRequests: 1000
    loadBalancer:
      consistentHash:
        httpCookie:
          name: user-session
          ttl: 3600s
  subsets:
    - name: v1
      labels:
        version: v1

---
# =====================================================
# Peer Authentication (mTLS)
# =====================================================

apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: facebook-clone
spec:
  mtls:
    mode: STRICT

---
# =====================================================
# Authorization Policies
# =====================================================

apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: deny-all
  namespace: facebook-clone
spec:
  {}
  # Empty rules = deny all

---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-from-gateway
  namespace: facebook-clone
spec:
  rules:
    - from:
        - source:
            principals: ["cluster.local/ns/istio-system/sa/istio-ingressgateway-service-account"]

---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-internal-services
  namespace: facebook-clone
spec:
  rules:
    - from:
        - source:
            namespaces: ["facebook-clone"]

---
# =====================================================
# Service Entries (External Services)
# =====================================================

apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  name: aws-s3
  namespace: facebook-clone
spec:
  hosts:
    - "*.s3.amazonaws.com"
  ports:
    - number: 443
      name: https
      protocol: HTTPS
  location: MESH_EXTERNAL
  resolution: DNS

---
apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  name: fcm-googleapis
  namespace: facebook-clone
spec:
  hosts:
    - fcm.googleapis.com
  ports:
    - number: 443
      name: https
      protocol: HTTPS
  location: MESH_EXTERNAL
  resolution: DNS

---
# =====================================================
# Envoy Filters (Custom Extensions)
# =====================================================

apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: cors-filter
  namespace: facebook-clone
spec:
  configPatches:
    - applyTo: NETWORK_FILTER
      match:
        context: ANY
      patch:
        operation: MERGE
        value:
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
            route_config:
              response_headers_to_add:
                - header:
                    key: "X-Content-Type-Options"
                    value: "nosniff"
                - header:
                    key: "X-Frame-Options"
                    value: "DENY"
                - header:
                    key: "X-XSS-Protection"
                    value: "1; mode=block"

---
# =====================================================
# Rate Limiting
# =====================================================

apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: rate-limit-filter
  namespace: facebook-clone
spec:
  configPatches:
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
      patch:
        operation: INSERT_BEFORE
        value:
          name: envoy.filters.http.ratelimit
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.ratelimit.v3.RateLimit
            domain: facebook-clone
            failure_mode_deny: true
            timeout: 3s
            rate_limit_service:
              grpc_service:
                envoy_grpc:
                  cluster_name: rate_limit_cluster
              transport_api_version: V3

---
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: rate-limit-cluster
  namespace: facebook-clone
spec:
  configPatches:
    - applyTo: CLUSTER
      patch:
        operation: ADD
        value:
          name: rate_limit_cluster
          type: STRICT_DNS
          connect_timeout: 3s
          lb_policy: ROUND_ROBIN
          http2_protocol_options: {}
          load_assignment:
            cluster_name: rate_limit_cluster
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: rate-limiter-service
                          port_value: 8081
